<!DOCTYPE html>
<html lang="mn">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Шатар (Албан ёсны дүрэмтэй)</title>

  <!-- Chessboard CSS -->
  <link rel="stylesheet" href="https://unpkg.com/chessboardjs@1.0.0/www/css/chessboard-1.0.0.min.css">

  <style>
    :root{
      --bg:#111; --card:#1b1b1b; --border:#2a2a2a; --text:#eee;
    }
    body{
      margin:0;
      font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
      background:var(--bg);
      color:var(--text);
      display:flex;
      justify-content:center;
      padding:16px;
    }
    .wrap{ width:min(560px, 96vw); }
    h1{
      margin:0 0 10px 0;
      font-size:20px;
      font-weight:800;
      display:flex;
      align-items:center;
      gap:10px;
    }
    #board{
      width:100%;
      border-radius:14px;
      overflow:hidden;
      box-shadow: 0 10px 30px rgba(0,0,0,.35);
      touch-action: none; /* mobile drag stable */
    }
    .panel{
      margin-top:10px;
      background:var(--card);
      border:1px solid var(--border);
      border-radius:14px;
      padding:12px;
      display:flex;
      flex-direction:column;
      gap:10px;
    }
    .row{
      display:flex;
      gap:10px;
      flex-wrap:wrap;
      align-items:center;
      justify-content:space-between;
    }
    .badge{
      background:#0f0f0f;
      border:1px solid var(--border);
      border-radius:12px;
      padding:8px 10px;
      font-size:14px;
      line-height:1.2;
      flex:1;
      min-width:160px;
    }
    .btns{ display:flex; gap:8px; flex-wrap:wrap; }
    button{
      border:1px solid var(--border);
      background:#151515;
      color:var(--text);
      padding:10px 12px;
      border-radius:12px;
      font-weight:700;
      cursor:pointer;
    }
    button:active{ transform:scale(.99); }

    .hint{ font-size:12px; opacity:.85; }

    /* highlight squares */
    .hl-from { box-shadow: inset 0 0 0 4px rgba(255, 215, 0, 0.65); }
    .hl-move { box-shadow: inset 0 0 0 4px rgba(0, 180, 255, 0.55); }
    .hl-cap  { box-shadow: inset 0 0 0 4px rgba(255, 70, 70, 0.65); }

    /* Move list */
    .moves{
      max-height:160px;
      overflow:auto;
      background:#0f0f0f;
      border:1px solid var(--border);
      border-radius:12px;
      padding:10px;
      font-size:13px;
      line-height:1.4;
      white-space:pre-wrap;
    }

    /* Promotion modal */
    .modal{
      position:fixed; inset:0;
      background:rgba(0,0,0,.55);
      display:none;
      align-items:center;
      justify-content:center;
      padding:16px;
      z-index:9999;
    }
    .modalCard{
      width:min(420px, 96vw);
      background:#141414;
      border:1px solid var(--border);
      border-radius:16px;
      padding:14px;
      box-shadow:0 20px 60px rgba(0,0,0,.5);
    }
    .modalTitle{ font-weight:800; margin-bottom:10px; }
    .promoBtns{ display:flex; gap:10px; flex-wrap:wrap; }
    .promoBtns button{ flex:1; min-width:90px; }
  </style>
</head>

<body>
  <div class="wrap">
    <h1>♟️ Шатар (Олон улсын стандарт)</h1>

    <div id="board"></div>

    <div class="panel">
      <div class="row">
        <div class="badge" id="turn">Ээлж: -</div>
        <div class="badge" id="status">Төлөв: -</div>
      </div>

      <div class="row">
        <div class="btns">
          <button id="newGame">🆕 New game</button>
          <button id="undo">↩️ Undo</button>
          <button id="flip">🔄 Flip</button>
        </div>
        <div class="badge" id="winner">Win: -</div>
      </div>

      <div class="badge">
        Нүүдлүүд:
        <div class="moves" id="moves">-</div>
      </div>

      <div class="hint">
        ✅ Хууль бус нүүдэл хийхгүй • Шах/Мат/Пат/Тэнцээ автоматаар зарлана • Win нэр гарна
      </div>
    </div>
  </div>

  <!-- ✅ IMPORTANT: jQuery must be first for chessboard.js -->
  <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>

  <!-- chess.js (rules engine) -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/chess.js/1.0.0/chess.min.js"></script>

  <!-- chessboard.js (UI board) -->
  <script src="https://unpkg.com/chessboardjs@1.0.0/www/js/chessboard-1.0.0.min.js"></script>

  <!-- Promotion modal -->
  <div class="modal" id="promoModal">
    <div class="modalCard">
      <div class="modalTitle">Promotion — ямар хүү болгох вэ?</div>
      <div class="promoBtns">
        <button data-p="q">👑 Queen</button>
        <button data-p="r">🏰 Rook</button>
        <button data-p="b">⛪ Bishop</button>
        <button data-p="n">🐴 Knight</button>
      </div>
      <div class="hint" style="margin-top:10px; opacity:.8;">(Албан дүрэм: pawn сүүлд хүрвэл promotion заавал.)</div>
    </div>
  </div>

  <script>
    // ===== State =====
    const game = new Chess();
    let board = null;

    // Promotion flow
    let pendingPromotion = null; // {from, to}

    function setText(id, text){ document.getElementById(id).textContent = text; }

    function removeHighlights(){
      document.querySelectorAll('#board .square-55d63').forEach(sq=>{
        sq.classList.remove('hl-from','hl-move','hl-cap');
      });
    }

    function highlightMoves(from){
      removeHighlights();
      const moves = game.moves({square: from, verbose:true});
      if(!moves.length) return;

      const fromEl = document.querySelector(`#board .square-${from}`);
      if(fromEl) fromEl.classList.add('hl-from');

      moves.forEach(m=>{
        const toEl = document.querySelector(`#board .square-${m.to}`);
        if(!toEl) return;
        if(m.captured) toEl.classList.add('hl-cap');
        else toEl.classList.add('hl-move');
      });
    }

    function updateMoves(){
      const hist = game.history(); // SAN
      if(!hist.length){ setText('moves','-'); return; }
      let out = '';
      for(let i=0;i<hist.length;i+=2){
        const n = (i/2)+1;
        const w = hist[i] || '';
        const b = hist[i+1] || '';
        out += `${n}. ${w}${b ? '  ' + b : ''}\n`;
      }
      setText('moves', out.trim());
    }

    function updateStatus(){
      const turn = game.turn()==='w' ? 'Цагаан (White)' : 'Хар (Black)';
      setText('turn', `Ээлж: ${turn}`);

      let status = '';
      let winner = 'Win: -';

      if(game.isCheckmate()){
        const winSide = game.turn()==='w' ? 'Хар (Black)' : 'Цагаан (White)';
        status = 'ШАХ-МАТ!';
        winner = `Win: ${winSide}`;
      }else if(game.isStalemate()){
        status = 'ПАТ! (Тэнцээ)';
        winner = 'Win: Draw';
      }else if(game.isDraw()){
        status = 'ТЭНЦЭЭ (Draw)';
        winner = 'Win: Draw';
      }else{
        status = game.inCheck() ? 'ШАХ!' : 'Тоглолт үргэлжилж байна';
      }

      setText('status', `Төлөв: ${status}`);
      setText('winner', winner);
      updateMoves();
    }

    function needsPromotion(from, to){
      const piece = game.get(from);
      if(!piece || piece.type !== 'p') return false;
      const rank = to[1];
      return (piece.color==='w' && rank==='8') || (piece.color==='b' && rank==='1');
    }

    function showPromotion(from, to){
      pendingPromotion = {from, to};
      document.getElementById('promoModal').style.display = 'flex';
    }

    function hidePromotion(){
      document.getElementById('promoModal').style.display = 'none';
    }

    // ===== chessboard callbacks =====
    function onDragStart(source, piece){
      removeHighlights();
      if(game.isGameOver()) return false;

      // only move side to move
      const isWhiteTurn = game.turn()==='w';
      if(isWhiteTurn && piece.startsWith('b')) return false;
      if(!isWhiteTurn && piece.startsWith('w')) return false;

      setTimeout(()=>highlightMoves(source),0);
    }

    function onDrop(source, target){
      removeHighlights();

      // if promotion needed -> ask user
      if(needsPromotion(source, target)){
        showPromotion(source, target);
        return; // stop here, we'll make move after selection
      }

      const move = game.move({from:source, to:target, promotion:'q'}); // default queen if needed
      if(move === null) return 'snapback';

      updateStatus();
    }

    function onSnapEnd(){
      board.position(game.fen());
    }

    // ===== init =====
    function init(){
      board = Chessboard('board', {
        position: 'start',
        draggable: true,
        onDragStart,
        onDrop,
        onSnapEnd
      });

      updateStatus();

      document.getElementById('newGame').addEventListener('click', ()=>{
        game.reset();
        board.start();
        removeHighlights();
        updateStatus();
      });

      document.getElementById('undo').addEventListener('click', ()=>{
        game.undo(); // single undo (1 нүүдэл)
        board.position(game.fen());
        removeHighlights();
        updateStatus();
      });

      document.getElementById('flip').addEventListener('click', ()=> board.flip());

      // tap/click highlight
      document.getElementById('board').addEventListener('click', (e)=>{
        const sq = e.target.closest('.square-55d63');
        if(!sq) return;
        const sqClass = [...sq.classList].find(c=>c.startsWith('square-') && c !== 'square-55d63');
        if(!sqClass) return;
        const square = sqClass.replace('square-','');
        highlightMoves(square);
      });

      // promotion selection
      document.querySelectorAll('#promoModal button[data-p]').forEach(btn=>{
        btn.addEventListener('click', ()=>{
          if(!pendingPromotion) return;
          const p = btn.getAttribute('data-p'); // q r b n
          const {from, to} = pendingPromotion;

          const move = game.move({from, to, promotion: p});
          hidePromotion();
          pendingPromotion = null;

          // illegal (just in case)
          if(move === null){
            board.position(game.fen());
            return;
          }

          board.position(game.fen());
          updateStatus();
        });
      });

      // close modal if tap outside card
      document.getElementById('promoModal').addEventListener('click', (e)=>{
        if(e.target.id === 'promoModal'){
          // Don't allow cancel promotion -> just close and reset piece position
          hidePromotion();
          pendingPromotion = null;
          board.position(game.fen());
        }
      });
    }

    init();
  </script>
</body>
</html>
