<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>International Checkers</title>
  <link rel="stylesheet" href="./checkers.css?v=3">
</head>
<body>
  <div class="wrap">
    <h1 class="title">International Checkers</h1>

    <div class="card">
      <div id="status" class="status">Turn: -</div>
      <button id="restart" class="btn">Restart</button>
    </div>

    <!-- ✅ Хамгийн чухал нь энэ -->
    <div id="board" class="board" aria-label="checkers board"></div>

    <div class="card">
      <h2>Rules</h2>
      <ul>
        <li>If capture is possible, you must capture.</li>
        <li>Multi-capture is allowed.</li>
        <li>Reach last row → becomes King.</li>
        <li>King moves diagonally any distance.</li>
      </ul>
      <div id="hint" class="hint">Tap a piece → then tap a highlighted square.</div>
    </div>
  </div>

  <script src="./checkers.js?v=3"></script>
</body>
</html>
