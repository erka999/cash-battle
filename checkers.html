<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>CashBattle — Checkers</title>

  <!-- ✅ CACHE-ийг задалж шинэ CSS ачаалуулах -->
  <link rel="stylesheet" href="./checkers.css?v=20260222" />
</head>
<body>
  <div class="wrap">
    <h1 class="title">CashBattle Game</h1>

    <div class="tabs">
      <a class="tab" href="./chess.html">♟️ Chess</a>
      <a class="tab active" href="./checkers.html">⚫ Checkers</a>
    </div>

    <div class="panel">
      <div class="panelTop">
        <div class="panelTitle">CHOOSE YOUR MODE</div>

        <button id="modeBot" class="btn big green">🤖 PLAY VS COMPUTER</button>
        <button id="modeHuman" class="btn big blue">👥 2 PLAYERS (LOCAL)</button>

        <div class="row2">
          <button id="findMatch" class="btn dark">🔎 FIND OPPONENT</button>
          <button id="restart" class="btn dark">🔄 RESTART</button>
        </div>

        <div class="rowInfo">
          <div id="status" class="pill">Turn: -</div>
          <div class="pill">International Checkers</div>
        </div>
      </div>

      <div class="boardWrap">
        <div id="board" class="board" aria-label="Checkers Board"></div>
        <div id="hint" class="hint">Tap a piece → then tap a highlighted square to move</div>
      </div>
    </div>

    <div class="panel rulesPanel">
      <div class="rulesTitle">Rules</div>
      <ul class="rules">
        <li>If capture is possible, you must capture.</li>
        <li>Multi-capture is allowed.</li>
        <li>Reach last row → becomes King.</li>
        <li>King moves diagonally any distance.</li>
      </ul>
    </div>
  </div>

  <script src="./checkers.js?v=20260222"></script>
</body>
</html>
