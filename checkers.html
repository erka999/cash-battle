<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Cash Battle Game</title>

<style>
body{
  background:#111;
  color:white;
  font-family:Arial;
  text-align:center;
  margin:0;
  padding:20px;
}

h1{
  margin-bottom:20px;
}

.menu button{
  padding:12px 20px;
  margin:10px;
  border-radius:12px;
  border:none;
  font-size:18px;
  cursor:pointer;
}

.card{
  background:#1b1b1b;
  border-radius:16px;
  padding:20px;
  margin-top:20px;
}
</style>
</head>

<body>

<h1>🎮 Cash Battle Game</h1>

<div class="menu">
  <button onclick="openChess()">♟️ Chess</button>
  <button onclick="openCheckers()">⚫ Checkers</button>
</div>

<div id="game" class="card">
Select a game
</div>

<script>
function openChess(){
document.getElementById("game").innerHTML =
`
<h2>Chess Game</h2>
<p>Two players can play chess.</p>
<p>Winner will be announced.</p>
<a href="chess.html">Start Chess</a>
`;
}

function openCheckers(){
document.getElementById("game").innerHTML =
`
<h2>Checkers Game</h2>
<p>Rules:</p>
<ul style="text-align:left">
<li>You must capture if possible</li>
<li>Multi-capture allowed</li>
<li>Reach last row to become King</li>
<li>Kings move diagonally long</li>
</ul>
<a href="checkers.html">Start Checkers</a>
`;
}
</script>

</body>
</html>
