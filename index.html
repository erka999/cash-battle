<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cash Battle Game</title>

<style>
body{
  background:#111;
  color:white;
  font-family:Arial;
  text-align:center;
}

button{
  padding:10px 15px;
  margin:5px;
  border-radius:10px;
  border:none;
  font-size:16px;
}

.card{
  background:#1b1b1b;
  padding:15px;
  margin:10px;
  border-radius:15px;
}
</style>
</head>

<body>

<h1>CashBattle Game</h1>

<div class="card">
  <button>♟ Chess</button>
  <button>⚫ Checkers</button>
</div>

<div class="card">
  <h2>International Checkers</h2>
  <p><b>Turn:</b> White</p>
  <button>Restart</button>
</div>

<div class="card">
  <h3>Rules</h3>
  <p>• If capture is possible, you must capture.</p>
  <p>• Multi-capture is allowed.</p>
  <p>• Reach last row → becomes King.</p>
  <p>• King moves diagonally any distance.</p>
</div>

<div class="card">
  <h3>Help</h3>
  <p>Play with your friend and win coins.</p>
</div>

</body>
</html>
