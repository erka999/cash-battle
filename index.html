<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <title>Chess + Checkers</title>
  <style>
    body{margin:0;background:#111;color:#fff;font-family:sans-serif}
    .top{
      display:flex;gap:10px;justify-content:center;
      padding:12px;background:#1b1b1b;position:sticky;top:0
    }
    button{
      padding:10px 16px;border:0;border-radius:10px;
      font-size:16px
    }
    iframe{
      width:100%;
      height:calc(100vh - 60px);
      border:0;
    }
  </style>
</head>
<body>
  <div class="top">
    <button onclick="openGame('chess.html')">♟ Шатар</button>
    <button onclick="openGame('checkers.html')">⚫ Даам</button>
  </div>

  <iframe id="gameFrame" src="chess.html"></iframe>

  <script>
    function openGame(file){
      document.getElementById("gameFrame").src = file;
    }
  </script>
</body>
</html>
